name: Trigger Coolify Deploy

on:
  workflow_run:
    workflows:
      - Create and publish a Docker image
      - Create and publish a Docker image (next)
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy-via-coolify-webhook:
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop') }}
    runs-on: ubuntu-latest
    steps:
      - name: Select webhook by branch
        id: webhook
        env:
          MAIN_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_MAIN }}
          DEVELOP_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_DEVELOP }}
          FALLBACK_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          if [ -z "${API_TOKEN}" ]; then
            echo "Missing required secret: COOLIFY_API_TOKEN"
            exit 1
          fi

          #if [ "$HEAD_BRANCH" = "main" ] && [ -n "${MAIN_WEBHOOK}" ]; then
          #  echo "url=${MAIN_WEBHOOK}" >> "$GITHUB_OUTPUT"
          #  exit 0
          #fi

          if [ "$HEAD_BRANCH" = "develop" ] && [ -n "${DEVELOP_WEBHOOK}" ]; then
            echo "url=${DEVELOP_WEBHOOK}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Coolify webhook secret configured for branch: $HEAD_BRANCH"
          exit 1

      - name: Trigger Coolify deployment webhook
        env:
          WEBHOOK_URL: ${{ steps.webhook.outputs.url }}
          API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail

          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${API_TOKEN}" \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 5 \
            "$WEBHOOK_URL"
