name: Create and publish a Docker image (next)

on:
  push:
    branches: ['develop']
    paths:
      - 'app/**'
      - 'server/**'
      - 'public/**'
      - 'prisma/**'
      - 'modules/**'
      - '.config/entrypoint.sh'
      - 'nuxt.config.ts'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=next

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .config/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Coolify deployment
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ secrets.COOLIFY_RESOURCE_UUID_DEVELOP }}
          COOLIFY_RESOURCE_TAG: next
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_BASE_URL}" ] || [ -z "${COOLIFY_API_TOKEN}" ]; then
            echo "Missing Coolify API configuration for develop deployment"
            exit 1
          fi

          deploy_endpoint="${COOLIFY_BASE_URL%/}/api/v1/deploy"

          if [ -n "${COOLIFY_RESOURCE_UUID:-}" ]; then
            curl --fail --show-error --silent \
              --request GET \
              --get \
              --header "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              --data-urlencode "uuid=${COOLIFY_RESOURCE_UUID}" \
              "${deploy_endpoint}"
          else
            curl --fail --show-error --silent \
              --request GET \
              --get \
              --header "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              --data-urlencode "tag=${COOLIFY_RESOURCE_TAG}" \
              "${deploy_endpoint}"
          fi
            
          echo "Triggered Coolify deployment via API."
